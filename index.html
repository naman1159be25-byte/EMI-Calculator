<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h2>EMI Calculator</h2>
        <label>Loan Type:</label>
        <select id="loanType">
            <option value="0">Home Loan</option>
            <option value="1">Education Loan</option>
            <option value="2">Car Loan</option>
            <option value="3">Personal Loan</option>
        </select>

        <label>Bank:</label>
        <div class="box">
            <img src="https://1000logos.net/wp-content/uploads/2018/03/SBI-Logo.png" alt="">
            <select id="bank"></select>
            
        </div>
        

        <label>Loan Amount:</label>
        <input type="number" id="amount">
        <p id="amtError" style="color:rgba(255, 0, 0, 0.516);font-size:small;"></p>

        <label>Interest Rate (%):</label>
        <input type="number" id="rate">

        <label>Time (months):</label>
        <input type="number" id="time">

        <button onclick="calculateEMI()">Calculate EMI</button>

        <h3 id="result"></h3>
    </div>
    <script src="script.js"></script>
</body>

</html>
